<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Outer thin ring -->
  <circle cx="20" cy="20" r="18.5" stroke="#1a1a1a" stroke-width="0.4" opacity="0.3"/>

  <!-- Rotated square (diamond frame) -->
  <path d="M20 5 L35 20 L20 35 L5 20 Z" stroke="#1a1a1a" stroke-width="1.2" opacity="0.8"/>

  <!-- Cardinal tick marks (red) outside diamond -->
  <line x1="20" y1="1.5" x2="20" y2="4.2" stroke="#e63329" stroke-width="1.6" stroke-linecap="square"/>
  <line x1="20" y1="35.8" x2="20" y2="38.5" stroke="#e63329" stroke-width="1.6" stroke-linecap="square"/>
  <line x1="1.5" y1="20" x2="4.2" y2="20" stroke="#e63329" stroke-width="1.6" stroke-linecap="square"/>
  <line x1="35.8" y1="20" x2="38.5" y2="20" stroke="#e63329" stroke-width="1.6" stroke-linecap="square"/>

  <!-- Diagonal short ticks (45°) — cipher wheel detail -->
  <line x1="8.5" y1="8.5" x2="10.5" y2="10.5" stroke="#1a1a1a" stroke-width="0.6" opacity="0.35"/>
  <line x1="31.5" y1="8.5" x2="29.5" y2="10.5" stroke="#1a1a1a" stroke-width="0.6" opacity="0.35"/>
  <line x1="8.5" y1="31.5" x2="10.5" y2="29.5" stroke="#1a1a1a" stroke-width="0.6" opacity="0.35"/>
  <line x1="31.5" y1="31.5" x2="29.5" y2="29.5" stroke="#1a1a1a" stroke-width="0.6" opacity="0.35"/>

  <!-- Inner circle (lock ring) -->
  <circle cx="20" cy="20" r="7" stroke="#1a1a1a" stroke-width="0.8" opacity="0.35"/>

  <!-- Center red filled circle -->
  <circle cx="20" cy="20" r="4.5" fill="#e63329"/>

  <!-- Center white inner dot -->
  <circle cx="20" cy="20" r="1.6" fill="#f4f1ea"/>

  <!-- Diamond corner dots -->
  <circle cx="20" cy="5" r="1.2" fill="#1a1a1a" opacity="0.5"/>
  <circle cx="35" cy="20" r="1.2" fill="#1a1a1a" opacity="0.5"/>
  <circle cx="20" cy="35" r="1.2" fill="#1a1a1a" opacity="0.5"/>
  <circle cx="5" cy="20" r="1.2" fill="#1a1a1a" opacity="0.5"/>
</svg>
